name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: |
        if [ -f src/python/requirements.txt ]; then pip install -r src/python/requirements.txt; fi
    - name: Build protos
      run: |
        mkdir ./src/proto/redup_proto_textprocessor
        mv ./src/proto/redup ./src/proto/redup_proto_textprocessor
        python3 -m grpc_tools.protoc \
          -I ./src/proto \
          --python_out=./src/python/ \
          --grpc_python_out=./src/python/  \
          ./src/proto/*/*/*/*/*.proto

    - name: Build release distributions
      run: |
        cp README.md src/python
        cp VERSION src/python
        cd src/python
        python -m pip install build
        python -m build
        mv dist/ ../..
        cd ../..

    - name: Upload distributions
      uses: actions/upload-artifact@v4
      with:
        name: release-dists
        path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
    - name: Retrieve release distributions
      uses: actions/download-artifact@v4
      with:
        name: release-dists
        path: dist/

    - name: Publish release distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.pypi_password }}
        packages-dir: dist/
