name: Test Python Package
on: [push, pull_request]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests pytest pytest-cov pytest-asyncio
        if [ -f src/python/requirements.txt ]; then pip install -r src/python/requirements.txt; fi
    - name: Build protos
      run: |
        python3 -m grpc_tools.protoc \
          -I ./src/proto \
          --python_out=./src/python/redup_proto_textprocessor \
          --grpc_python_out=./src/python/redup_proto_textprocessor  \
          ./src/proto/*/*/*/*.proto
    - name: Test with pytest
      run: |
        PYTHONPATH=./src/python/ pytest src/python/tests/ --cov=./src/python/redup_proto_textprocessor --cov-report=xml
